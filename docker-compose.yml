services:

  minio:
    image: minio/minio:latest
    container_name: midtenn_minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped

  prefect:
    image: prefecthq/prefect:3-latest
    container_name: midtenn_prefect
    ports:
      - "4200:4200"
    environment:
      PREFECT_SERVER_API_HOST: 0.0.0.0
    command: prefect server start
    restart: unless-stopped

  postgres:
    image: postgres:16
    container_name: midtenn_postgres
    ports:
      - "5434:5432"
    environment:
      POSTGRES_DB: metabase
      POSTGRES_USER: datajing 
      POSTGRES_PASSWORD: datajing
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  metabase:
    image: metabase/metabase:latest
    container_name: midtenn_metabase
    ports:
      - "3001:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabase
      MB_DB_PORT: 5432
      MB_DB_USER: datajing
      MB_DB_PASS: datajing
      MB_DB_HOST: postgres
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  minio_data:
  postgres_data:
