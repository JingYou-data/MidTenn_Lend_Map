  <line x1="683" y1="168" x2="715" y2="168" stroke="#95A5A6" stroke-width="1.4" marker-end="url(#arr)"/>
  <line x1="683" y1="260" x2="715" y2="260" stroke="#95A5A6" stroke-width="1.4" marker-end="url(#arr)"/>

  <!-- Prefect bar -->
  <rect x="10" y="448" width="900" height="74" rx="8" fill="#EAFAF1" stroke="#27AE60" stroke-width="2" stroke-dasharray="6 3"/>
  <text x="460" y="476" text-anchor="middle" font-size="14" font-weight="bold" fill="#1E8449">&#x26A1; Prefect Orchestration</text>
  <text x="460" y="500" text-anchor="middle" font-size="11" fill="#555">Automated end-to-end pipeline scheduling — Ingest → Upload → SQLMesh → Export | Daily @ 2:00 AM</text>
