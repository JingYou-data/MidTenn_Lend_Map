  <text x="87" y="196" text-anchor="middle" font-size="12" font-weight="600" fill="#2471A3">FDIC API</text>

  <rect x="22" y="220" width="130" height="34" rx="6" fill="white" stroke="#2471A3" stroke-width="1.5"/>
