  <line x1="152" y1="99"  x2="181" y2="150" stroke="#95A5A6" stroke-width="1.4" marker-end="url(#arr)"/>
  <line x1="152" y1="145" x2="181" y2="158" stroke="#95A5A6" stroke-width="1.4" marker-end="url(#arr)"/>
  <line x1="152" y1="191" x2="181" y2="165" stroke="#95A5A6" stroke-width="1.4" marker-end="url(#arr)"/>
  <line x1="152" y1="237" x2="181" y2="230" stroke="#95A5A6" stroke-width="1.4" marker-end="url(#arr)"/>
  <line x1="152" y1="283" x2="181" y2="248" stroke="#95A5A6" stroke-width="1.4" marker-end="url(#arr)"/>

  <!-- Raw Lake to Bronze -->
  <line x1="307" y1="158" x2="335" y2="120" stroke="#95A5A6" stroke-width="1.4" marker-end="url(#arr)"/>
  <line x1="307" y1="238" x2="335" y2="140" stroke="#95A5A6" stroke-width="1.4" marker-end="url(#arr)"/>

  <!-- Bronze to Silver to Gold -->
  <line x1="422" y1="138" x2="422" y2="166" stroke="#1E8449" stroke-width="2" marker-end="url(#arr-green)"/>
  <line x1="422" y1="224" x2="422" y2="252" stroke="#1E8449" stroke-width="2" marker-end="url(#arr-green)"/>

  <!-- Gold to Serving -->
  <line x1="508" y1="272" x2="540" y2="180" stroke="#95A5A6" stroke-width="1.4" marker-end="url(#arr)"/>
  <line x1="508" y1="292" x2="540" y2="265" stroke="#95A5A6" stroke-width="1.4" marker-end="url(#arr)"/>

