  <text x="612" y="183" text-anchor="middle" font-size="10" fill="#7F8C8D">Cloud Data Warehouse</text>

  <rect x="542" y="232" width="141" height="56" rx="6" fill="white" stroke="#7D3C98" stroke-width="1.5"/>
  <text x="612" y="255" text-anchor="middle" font-size="13" font-weight="700" fill="#7D3C98">PostgreSQL</text>
  <text x="612" y="275" text-anchor="middle" font-size="10" fill="#7F8C8D">Local DB (Docker)</text>

