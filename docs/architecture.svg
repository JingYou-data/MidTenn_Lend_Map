  <rect x="717" y="140" width="181" height="56" rx="6" fill="white" stroke="#C0392B" stroke-width="1.5"/>
  <text x="807" y="163" text-anchor="middle" font-size="13" font-weight="700" fill="#C0392B">Power BI</text>
  <text x="807" y="182" text-anchor="middle" font-size="10" fill="#7F8C8D">6 pages · drill-through · Snowflake</text>

  <rect x="717" y="232" width="181" height="56" rx="6" fill="white" stroke="#C0392B" stroke-width="1.5"/>
  <text x="807" y="255" text-anchor="middle" font-size="13" font-weight="700" fill="#C0392B">Metabase</text>
