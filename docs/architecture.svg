  <text x="612" y="68" text-anchor="middle" font-size="12" font-weight="bold" fill="#7D3C98">&#x2601; Serving Layer</text>
  <text x="807" y="68" text-anchor="middle" font-size="12" font-weight="bold" fill="#C0392B">&#x1F4CA; Analytics</text>

