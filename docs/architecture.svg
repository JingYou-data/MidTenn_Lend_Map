  <text x="460" y="32" text-anchor="middle" font-size="19" font-weight="bold" fill="#2C3E50">MidTenn Lend Map — Data Pipeline Architecture</text>

  <!-- Column backgrounds -->
  <rect x="10"  y="45" width="155" height="370" rx="8" fill="#EBF5FB" stroke="#AED6F1" stroke-width="1.2"/>
  <rect x="175" y="45" width="140" height="370" rx="8" fill="#FEF9E7" stroke="#F9E79F" stroke-width="1.2"/>
  <rect x="325" y="45" width="195" height="370" rx="8" fill="#EAFAF1" stroke="#A9DFBF" stroke-width="1.2"/>
  <rect x="530" y="45" width="165" height="370" rx="8" fill="#F5EEF8" stroke="#D2B4DE" stroke-width="1.2"/>
